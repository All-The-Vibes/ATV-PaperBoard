name: CI

on:
  push:
    branches: [main]
    # Tag pushes (v*) are handled by pypi-publish.yml; don't double-run here.
    tags-ignore: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same PR / branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff check
        # Python-only — explicit paths avoid false errors on the Jinja
        # templates and DESIGN.md files now nested inside core/.
        run: ruff check core tests adapters

  test:
    name: Tests (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Python matrix on Linux + a single sanity job on macOS and
        # Windows at the current LTS Python. Keeps the matrix at 5 jobs
        # instead of 9 while still covering every supported OS.
        os: [ubuntu-latest]
        python: ["3.10", "3.11", "3.12"]
        include:
          - os: macos-latest
            python: "3.12"
          - os: windows-latest
            python: "3.12"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node bridge (@google/design.md)
        run: npm ci

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: pytest
        # Phase 0 harness tests are gated by @pytest.mark.skip — they
        # don't run here. Everything else must pass.
        run: pytest tests/ -q

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Build
        run: python -m build
      - name: Twine check
        run: python -m twine check dist/*
      - name: Verify wheel contains templates + designs
        # Belt-and-suspenders: the wheel MUST ship core/templates/ and
        # core/designs/ as package-data, otherwise a `pip install
        # atv-paperboard` produces a broken `paperboard` binary that
        # crashes on first render. Fail CI fast if this regresses.
        run: |
          python - <<'PY'
          import sys, zipfile, glob
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          required = [
              "core/templates/pico-tier.html.j2",
              "core/templates/daisy-tier.html.j2",
              "core/templates/gallery.html.j2",
              "core/designs/paperboard.DESIGN.md",
          ]
          missing = [r for r in required if r not in names]
          if missing:
              print(f"::error::Wheel is missing required package-data: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: wheel {whl} contains all required package-data.")
          PY
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  smoke-install:
    name: Smoke test — install from wheel
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Fresh venv install + render
        # Prove the wheel actually works end-to-end from a clean
        # environment — install from the just-built wheel and render a
        # known-good example. Asserts the on-disk triple exists.
        run: |
          set -euo pipefail
          python -m venv /tmp/pb-smoke
          /tmp/pb-smoke/bin/pip install --upgrade pip
          /tmp/pb-smoke/bin/pip install dist/*.whl
          /tmp/pb-smoke/bin/paperboard render \
            --input examples/inputs/build-status.json \
            --no-open \
            --output-dir /tmp/pb-smoke/out
          test -f /tmp/pb-smoke/out/build-status.html
          test -f /tmp/pb-smoke/out/build-status.DESIGN.md
          test -f /tmp/pb-smoke/out/build-status.meta.yaml
