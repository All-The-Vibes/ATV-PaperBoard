name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Pre-publish test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install Node bridge
        run: npm ci
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check core tests adapters
      - name: Test
        # If tests fail here we MUST NOT publish. The whole point of
        # gating publish behind a tag is that the maintainer asserts
        # the code is shippable; this is the automated guardrail.
        run: pytest tests/ -q

  build-and-publish:
    name: Build wheel + sdist and publish via Trusted Publishing
    needs: [test]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/atv-paperboard
    permissions:
      # IMPORTANT: id-token: write is required for PyPI Trusted Publishing (OIDC).
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify tag matches pyproject version
        # Refuse to publish if the git tag and pyproject.toml drift apart.
        # Tag format: v0.1.2 → strip leading 'v' and compare against
        # `project.version` in pyproject.toml.
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          tag_version="${tag#v}"
          py_version="$(python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "git tag      : ${tag} (parsed: ${tag_version})"
          echo "pyproject    : ${py_version}"
          if [ "${tag_version}" != "${py_version}" ]; then
            echo "::error::Tag ${tag} does not match pyproject.toml version ${py_version}. Refusing to publish."
            exit 1
          fi

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify packages
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password / API token — Trusted Publishing uses OIDC.
          # The matching PyPI publisher must specify:
          #   owner: All-The-Vibes
          #   repo:  ATV-PaperBoard
          #   workflow_filename: pypi-publish.yml
          #   environment: pypi
          print-hash: true
